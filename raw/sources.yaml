# StorePep Knowledge Base — Source Registry
# This file is the single source of truth for all raw input sources.
# Claude reads this to resolve paths. Never hardcode raw/ paths elsewhere.

sources:
  storepep-react:
    type: git-submodule
    path: raw/storepep-react
    description: "Main StorePep SaaS codebase (React frontend + Node backend)"
    repo: git@bitbucket.org:xadapter-cyd/storepep-react.git

  mcsl-test-automation:
    type: git-submodule
    path: raw/mcsl-test-automation
    description: "Playwright E2E test suite"
    repo: git@bitbucket.org:xadapter-cyd/mcsl-test-automation.git

  zendesk:
    type: webhook-json
    path: raw/zendesk
    description: "Customer support tickets synced from Zendesk API, categorized by product"
    sync: "scripts/sync-zendesk.sh"
    products:
      shopify:
        path: raw/zendesk/shopify
        pattern: "{ticketId}.json"
        tag: shopify_multi_carrier_shipping_label_app
        filters: "status<pending, support_type=agent"
        description: "Shopify Multi Carrier Shipping Label App tickets"
      other_platforms:
        path: raw/zendesk/other_platforms
        pattern: "{ticketId}.json"
        tags:
          - woocommerce_shipping_services
          - fedex_amea_woocommerce_shipping_services
          - magento_multi_carrier_shipping_label_app
          - bigcommerce_multi_carrier_shipping_label_app
          - storepep_shipping_solution
          - bigcommerce_ship_rate_and_track_for_fedex
        filters: "status<pending, support_type=agent"
        description: "Non-Shopify product tickets (WooCommerce, Magento, BigCommerce, StorePep, FedEx AMEA) — open status only"

  regression-scenarios:
    type: google-sheet
    path: raw/sheets/regression-scenarios.xlsx
    url: "https://docs.google.com/spreadsheets/d/1oVtOaM2PesVR_TkuVaBKpbp_qQdmq4FQnN43Xew0FuY"
    sync: manual
    description: "Master regression test plan with manual + automated test mapping"

  stage-zero-analysis:
    type: google-sheet
    path: raw/sheets/stage-zero-analysis.xlsx
    url: "https://docs.google.com/spreadsheets/d/1vlFfOu3faGW-OAgngEyPd45myLSEx2GYB-wsjgVvYyg"
    gid: "1368718443"
    sync: manual
    description: "Cross-app support triage sheet — all open tickets requiring dev action, categorized by product"

  slack:
    type: manual
    path: raw/slack
    pattern: "YYYY-MM-DD-<slug>.md"
    description: "Internal Slack conversations with product/engineering context — saved as markdown with frontmatter (date, channel, participants, related items)"
