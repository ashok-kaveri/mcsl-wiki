# StorePep Knowledge Base — Source Registry
# This file is the single source of truth for all raw input sources.
# Claude reads this to resolve paths. Never hardcode raw/ paths elsewhere.

sources:
  storepep-react:
    type: git-submodule
    path: raw/storepep-react
    description: "Main StorePep SaaS codebase (React frontend + Node backend)"
    repo: git@bitbucket.org:xadapter-cyd/storepep-react.git

  mcsl-test-automation:
    type: git-submodule
    path: raw/mcsl-test-automation
    description: "Playwright E2E test suite"
    repo: git@bitbucket.org:xadapter-cyd/mcsl-test-automation.git

  zendesk:
    type: webhook-json
    path: raw/zendesk
    pattern: "{ticketId}.json"
    description: "Customer support tickets synced from Zendesk API"
    sync: "scripts/sync-zendesk.sh"

  regression-scenarios:
    type: google-sheet
    path: raw/sheets/regression-scenarios.xlsx
    url: "https://docs.google.com/spreadsheets/d/1oVtOaM2PesVR_TkuVaBKpbp_qQdmq4FQnN43Xew0FuY"
    sync: manual
    description: "Master regression test plan with manual + automated test mapping"
